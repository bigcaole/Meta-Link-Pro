name: Build and Release Wails Windows EXE

on:
  push:
    branches:
      - main
      - 'codex/**'
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./backend/... ./cmd/...

  build-windows:
    needs: test
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Wails CLI
        shell: pwsh
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha.74
          "${HOME}/go/bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build Wails GUI EXE
        shell: pwsh
        run: |
          wails3 task windows:build PRODUCTION=true

      - name: Package artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Copy-Item -Path bin/Meta-Link-Pro.exe -Destination dist/Meta-Link-Pro.exe -Force
          Compress-Archive -Path dist/Meta-Link-Pro.exe -DestinationPath dist/Meta-Link-Pro-windows-amd64.zip -Force
          $hash = (Get-FileHash dist/Meta-Link-Pro-windows-amd64.zip -Algorithm SHA256).Hash
          "${hash}  Meta-Link-Pro-windows-amd64.zip" | Out-File -FilePath dist/SHA256SUMS.txt -Encoding ascii

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: meta-link-pro-windows-amd64
          path: |
            dist/Meta-Link-Pro.exe
            dist/Meta-Link-Pro-windows-amd64.zip
            dist/SHA256SUMS.txt

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-windows
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: meta-link-pro-windows-amd64
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/Meta-Link-Pro.exe
            dist/Meta-Link-Pro-windows-amd64.zip
            dist/SHA256SUMS.txt
